<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackersBun - CyberSecurity News</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23000'/><text x='50' y='68' font-size='50' font-weight='900' text-anchor='middle' fill='%23fff'>HB</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000; --bg-card: #0a0a0a; --bg-card-hover: #151515;
            --accent-primary: #ffffff; --accent-secondary: #888888;
            --text-primary: #ffffff; --text-secondary: #666666; --border: #222222;
        }
        [data-theme="light"] {
            --bg-primary: #f5f5f5; --bg-card: #ffffff; --bg-card-hover: #fafafa;
            --accent-primary: #000000; --accent-secondary: #444444;
            --text-primary: #000000; --text-secondary: #666666; --border: #e0e0e0;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: 0.3s; }
        header { position: fixed; top: 0; left: 0; right: 0; background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 24px; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.6rem; color: var(--accent-primary); display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 42px; height: 42px; background: var(--accent-primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem; color: var(--bg-primary); box-shadow: 4px 4px 0 var(--accent-secondary); }
        .header-controls { display: flex; align-items: center; gap: 16px; }
        .social-link { color: var(--text-secondary); font-size: 1.2rem; text-decoration: none; font-weight: 600; }
        .theme-toggle { width: 48px; height: 28px; background: var(--border); border: none; border-radius: 14px; cursor: pointer; position: relative; }
        .theme-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: var(--accent-primary); border-radius: 50%; transition: 0.3s; }
        [data-theme="light"] .theme-toggle::after { transform: translateX(20px); }
        .auto-refresh-toggle { display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; color: var(--text-secondary); }
        .toggle-switch { position: relative; width: 44px; height: 24px; background: var(--border); border-radius: 12px; cursor: pointer; }
        .toggle-switch.active { background: var(--accent-primary); }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: var(--bg-primary); border-radius: 50%; transition: 0.3s; }
        .toggle-switch.active::after { transform: translateX(20px); }
        .refresh-btn { background: var(--accent-primary); border: none; color: var(--bg-primary); padding: 10px 18px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; font-weight: 600; cursor: pointer; box-shadow: 4px 4px 0 var(--accent-secondary); }
        .refresh-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--accent-secondary); }
        .refresh-btn .spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: var(--bg-primary); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        .refresh-btn.loading .spinner { display: block; }
        .refresh-btn.loading .refresh-icon { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .flash-news { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 14px 0; overflow: hidden; position: relative; margin-top: 72px; }
        .flash-news-label { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: var(--accent-primary); color: var(--bg-primary); font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 700; padding: 6px 12px; border-radius: 6px; }
        .flash-news-track { display: flex; animation: scroll 25s linear infinite; width: max-content; }
        .flash-news-item { white-space: nowrap; padding: 0 60px; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; font-weight: 500; color: var(--accent-primary); text-shadow: 0 0 10px var(--accent-primary); cursor: pointer; }
        .flash-news-item::after { content: '→'; margin-left: 20px; font-weight: 700; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .flash-news:hover .flash-news-track { animation-play-state: paused; }
        main { max-width: 1400px; margin: 0 auto; padding: 40px 24px 48px; }
        .hero { text-align: center; margin-bottom: 24px; }
        .hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 8px; }
        .hero p { color: var(--text-secondary); font-size: 0.95rem; }
        .status-bar { display: flex; justify-content: center; align-items: center; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
        .status-item { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-primary); animation: pulse 2s infinite; }
        .status-dot.inactive { background: var(--text-secondary); animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .timer { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--accent-primary); font-weight: 600; }
        
        .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; justify-content: space-between; }
        .search-box { flex: 1; min-width: 200px; display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 10px 16px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-card); color: var(--text-primary); font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; }
        .search-box input:focus { outline: none; border-color: var(--accent-primary); }
        .search-box input::placeholder { color: var(--text-secondary); }
        .time-filter, .toolbar-actions { display: flex; gap: 8px; }
        .time-filter button, .action-btn { padding: 8px 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; cursor: pointer; transition: 0.2s; }
        .time-filter button:hover, .time-filter button.active, .action-btn:hover { background: var(--accent-primary); color: var(--bg-primary); border-color: var(--accent-primary); }

        .category-tabs { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
        .category-tab { background: var(--bg-card); border: 2px solid var(--border); color: var(--text-secondary); padding: 10px 18px; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 3px 3px 0 var(--border); }
        .category-tab:hover { transform: translate(-2px, -2px); color: var(--text-primary); }
        .category-tab.active { background: var(--accent-primary); border-color: var(--accent-primary); color: var(--bg-primary); box-shadow: 3px 3px 0 var(--accent-secondary); }

        .news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 1024px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .news-grid { grid-template-columns: 1fr; } }

        .news-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: 16px; padding: 20px; transition: 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; position: relative; box-shadow: 4px 4px 0 var(--border); overflow: hidden; }
        .news-card.linkedin-post { border-color: var(--accent-secondary); }
        .news-card.linkedin-post::before { content: 'in'; position: absolute; top: -1px; right: 16px; background: var(--accent-primary); color: var(--bg-primary); font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 700; padding: 4px 10px; border-radius: 0 0 8px 8px; }
        .news-card:hover { transform: translate(-4px, -4px); box-shadow: 8px 8px 0 var(--accent-secondary); border-color: var(--accent-primary); animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(-4px, -4px) rotate(0deg); } 25% { transform: translate(-2px, -4px) rotate(-2deg); } 50% { transform: translate(-4px, -2px) rotate(2deg); } 75% { transform: translate(-2px, -2px) rotate(-1deg); } }
        
        .card-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; gap: 12px; opacity: 0; transition: 0.2s; z-index: 10; }
        .news-card:hover .card-overlay { opacity: 1; }
        .overlay-btn { padding: 10px 20px; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 2px solid; }
        .overlay-btn.open-btn { background: var(--accent-primary); color: var(--bg-primary); border-color: var(--accent-primary); }
        .overlay-btn.open-btn:hover { transform: scale(1.05); }
        .overlay-btn.copy-btn { background: transparent; color: var(--accent-primary); border-color: var(--accent-primary); }
        .overlay-btn.copy-btn:hover { background: var(--accent-primary); color: var(--bg-primary); }
        .overlay-btn.copy-btn.copied { background: var(--accent-primary); color: var(--bg-primary); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .source { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .date { font-size: 0.7rem; color: var(--text-secondary); }
        .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
        .card-summary { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 4px 10px; border-radius: 20px; background: var(--border); color: var(--accent-primary); font-weight: 600; }
        .tag.important { background: var(--accent-primary); color: var(--bg-primary); }
        .cve-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 700; margin-left: 6px; }
        .cve-critical { background: #ff3366; color: white; }
        .cve-high { background: #ff6b35; color: white; }

        .no-results { grid-column: 1 / -1; text-align: center; padding: 64px; color: var(--text-secondary); }
        .no-results h3 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 8px; }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .loading-overlay.active { display: flex; }
        .cyber-loader { position: relative; width: 120px; height: 120px; }
        .cyber-loader .ring { position: absolute; width: 100%; height: 100%; border: 3px solid var(--border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1.5s linear infinite; }
        .cyber-loader .ring:nth-child(2) { width: 80%; height: 80%; top: 10%; left: 10%; border-top-color: var(--accent-secondary); animation-duration: 1.2s; animation-direction: reverse; }
        .cyber-loader .ring:nth-child(3) { width: 60%; height: 60%; top: 20%; left: 20%; border-top-color: var(--accent-primary); animation-duration: 0.9s; }
        .cyber-loader .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 700; color: var(--accent-primary); animation: pulse 1s infinite; letter-spacing: 2px; }
        .loading-progress { position: absolute; bottom: -85px; left: 50%; transform: translateX(-50%); font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--accent-primary); }
        .loading-progress span { font-size: 1rem; color: var(--text-secondary); }
        .loading-text { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-secondary); }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal.visible { display: flex; }
        .modal-content { background: var(--bg-card); border: 2px solid var(--border); border-radius: 16px; padding: 24px; max-width: 500px; max-height: 80vh; overflow-y: auto; width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-header h3 { font-family: 'Space Grotesk', sans-serif; color: var(--text-primary); }
        .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
        .bookmark-item { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .bookmark-item h4 { font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; color: var(--text-primary); margin-bottom: 8px; }
        .bookmark-item .meta { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-secondary); display: flex; gap: 12px; }
        .bookmark-actions { display: flex; gap: 8px; margin-top: 8px; }
        .bookmark-actions button { padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; background: var(--border); border: none; color: var(--text-primary); }

        footer { text-align: center; padding: 32px; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 48px; }
        .author { margin-top: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; }
        .author .highlight { color: var(--accent-primary); font-weight: 700; text-shadow: 0 0 10px var(--accent-primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="cyber-loader">
            <div class="ring"></div><div class="ring"></div><div class="ring"></div>
            <div class="center">SCANNING</div>
            <div class="loading-text">Fetching threat intel...</div>
            <div class="loading-progress" id="loadingProgress">0<span>%</span></div>
        </div>
    </div>

    <header>
        <div class="logo"><div class="logo-icon">HB</div> HackersBun</div>
        <div class="header-controls">
            <a href="https://www.linkedin.com/company/hackersbun/" target="_blank" class="social-link">in</a>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"></button>
            <div class="auto-refresh-toggle"><span>Auto</span><div class="toggle-switch" id="autoToggle" onclick="toggleAutoRefresh()"></div></div>
            <button class="refresh-btn" id="refreshBtn" onclick="fetchNews()"><span class="refresh-icon">↻</span><span class="spinner"></span>Refresh</button>
        </div>
    </header>

    <div class="flash-news">
        <div class="flash-news-label">AI Launches</div>
        <div class="flash-news-track" id="flashNewsTrack"></div>
    </div>

    <main>
        <section class="hero">
            <h1>Latest Cyber Security News</h1>
            <p>Real-time feed from cybersecurity sources</p>
            <p class="last-updated" id="lastUpdated"></p>
        </section>

        <div class="status-bar">
            <div class="status-item"><span class="status-dot" id="statusDot"></span><span id="statusText">Live</span></div>
            <div class="status-item"><span class="timer" id="countdown">Next refresh: 30s</span></div>
            <div class="status-item"><span id="newsCount">0 articles</span></div>
        </div>

        <div class="toolbar">
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search CVE, breach, malware..." oninput="filterNews()"></div>
            <div class="time-filter">
                <button class="active" data-time="all" onclick="setTimeFilter('all')">All</button>
                <button data-time="today" onclick="setTimeFilter('today')">Today</button>
                <button data-time="week" onclick="setTimeFilter('week')">Week</button>
                <button data-time="month" onclick="setTimeFilter('month')">Month</button>
            </div>
            <div class="toolbar-actions">
                <button class="action-btn" onclick="exportToCSV()">📥 Export CSV</button>
            </div>
        </div>

        <div class="category-tabs">
            <button class="category-tab active" data-category="all">All</button>
            <button class="category-tab" data-category="breach">Breaches</button>
            <button class="category-tab" data-category="vulnerability">Vulnerabilities</button>
            <button class="category-tab" data-category="attack">Attacks</button>
            <button class="category-tab" data-category="microsoft">Microsoft</button>
            <button class="category-tab" data-category="ai">AI Security</button>
            <button class="category-tab" data-category="ai-news">AI News</button>
        </div>

        <div class="news-grid" id="newsGrid"></div>
    </main>

    <footer>
        <p>HackersBun | Cybersecurity News Aggregator</p>
        <p class="author">Created by Girish <span class="highlight">H</span>aveli <span class="highlight">B</span>hadhu Rao</p>
    </footer>

    <script>
        let allNews = [], aiNews = [], bookmarks = [], currentCategory = 'all', currentTimeFilter = 'all';
        let autoRefreshEnabled = false, countdownInterval, refreshInterval, cdInterval = null, lastFetchedUrls = new Set(), isDarkMode = true;
        let searchQuery = '';

        const RSS_FEEDS = [
            { name: 'Krebs on Security', url: 'https://krebsonsecurity.com/feed/', source: 'Krebs on Security' },
            { name: 'The Hacker News', url: 'https://feeds.feedburner.com/TheHackersNews', source: 'The Hacker News' },
            { name: 'Dark Reading', url: 'https://www.darkreading.com/rss.xml', source: 'Dark Reading' },
            { name: 'Bleeping Computer', url: 'https://www.bleepingcomputer.com/feed/', source: 'Bleeping Computer' },
            { name: 'SecurityWeek', url: 'https://www.securityweek.com/rss-feed/', source: 'SecurityWeek' },
            { name: 'Cyberscoop', url: 'https://www.cyberscoop.com/feed/rss/', source: 'Cyberscoop' },
            { name: 'CyberSecurity News', url: 'https://cybersecuritynews.com/feed/', source: 'CyberSecurity News' },
            { name: 'Threatpost', url: 'https://threatpost.com/feed/', source: 'Threatpost' },
            { name: 'Secure World', url: 'https://www.secureworld.io/feed/', source: 'Secure World' },
            { name: 'Full Disclosure', url: 'https://www.fulldisclosure.io/feed', source: 'Full Disclosure' }
        ];

        const AI_RSS_FEEDS = [
            { name: 'OpenAI', url: 'https://openai.com/news/rss.xml', source: 'OpenAI' },
            { name: 'Hugging Face', url: 'https://huggingface.co/blog/feed.xml', source: 'Hugging Face' },
            { name: 'MIT Tech AI', url: 'https://www.technologyreview.com/feed/artificial-intelligence/', source: 'MIT Tech' },
            { name: 'MarkTechPost', url: 'https://www.marktechpost.com/feed/', source: 'MarkTechPost' },
            { name: 'The Decoder', url: 'https://aibusiness.com/rss.xml', source: 'The Decoder' },
            { name: 'Fast Company AI', url: 'https://fastcompany.com/section/artificial-intelligence/rss', source: 'Fast Company' },
            { name: 'Last Week in AI', url: 'https://lastweekin.ai/feed', source: 'Last Week in AI' },
            { name: 'Towards AI', url: 'https://pub.towardsai.net/feed', source: 'Towards AI' }
        ];

        function loadBookmarks() {
            const saved = localStorage.getItem('hackersbun_bookmarks');
            if (saved) bookmarks = JSON.parse(saved);
            document.getElementById('bookmarkCount').textContent = bookmarks.length;
        }

        function saveBookmarks() {
            localStorage.setItem('hackersbun_bookmarks', JSON.stringify(bookmarks));
            document.getElementById('bookmarkCount').textContent = bookmarks.length;
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        function loadTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) { isDarkMode = saved === 'dark'; document.documentElement.setAttribute('data-theme', saved); }
        }

        function extractSummary(d) { const div = document.createElement('div'); div.innerHTML = d; return (div.textContent || '').replace(/The post.*appeared first on.*/gi, '').trim().substring(0, 200); }
        function parseDate(ds) { if (!ds) return null; const d = new Date(ds); if (isNaN(d.getTime())) return null; return { original: ds, date: d, display: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }), time: d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }), timestamp: d.getTime() }; }
        function isWithinWeek(dObj) { if (!dObj) return true; return dObj.timestamp > (new Date().getTime() - 7 * 24 * 60 * 60 * 1000); }
        function isWithinDay(dObj) { if (!dObj) return false; return dObj.timestamp > (new Date().getTime() - 24 * 60 * 60 * 1000); }
        function isWithinMonth(dObj) { if (!dObj) return false; return dObj.timestamp > (new Date().getTime() - 30 * 24 * 60 * 60 * 1000); }
        function getRelativeDate(d) { const ms = new Date() - d; const mins = Math.floor(ms/60000), hrs = Math.floor(ms/3600000), days = Math.floor(ms/86400000); if (mins < 1) return 'Just now'; if (mins < 60) return mins + 'm ago'; if (hrs < 24) return hrs + 'h ago'; if (days === 1) return 'Yesterday'; if (days < 7) return days + 'd ago'; return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
        
        function categorizeArticle(i) {
            const t = i.title.toLowerCase(), c = i.categories.map(c => c.toLowerCase());
            if (c.some(c => c.includes('breach')) || t.includes('breach') || t.includes('leak')) return 'breach';
            if (c.some(c => c.includes('vulnerab')) || t.includes('vulnerability') || t.includes('cve-')) return 'vulnerability';
            if (c.some(c => c.includes('attack')) || t.includes('attack') || t.includes('exploit')) return 'attack';
            if (t.includes('microsoft') || t.includes('windows')) return 'microsoft';
            if (t.includes('ai') || t.includes('openai') || t.includes('claude') || t.includes('gpt')) return 'ai';
            return 'all';
        }

        function normalizeTitle(t) { return t.toLowerCase().replace(/&#8211;/g, '-').replace(/&#8220;/g, '"').replace(/&#8221;/g, '"').replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim(); }
        function isSimilar(t1, t2) { const n1 = normalizeTitle(t1), n2 = normalizeTitle(t2); return n1 === n2 || n1.includes(n2) || n2.includes(n1); }
        function removeDuplicates(news) { const seen = new Set(), unique = []; for (const item of news) { let dup = false; for (const t of seen) { if (isSimilar(item.title, t)) { dup = true; break; } } if (!dup) { seen.add(item.title); unique.push(item); } } return unique; }

        function extractCVE(title) { const match = title.match(/CVE-\d{4}-\d+/i); return match ? match[0].toUpperCase() : null; }
        function getCVEBadge(title) { const cve = extractCVE(title); if (!cve) return ''; return `<span class="cve-badge cve-critical">${cve}</span>`; }
        function getCVESeverity(title) { const t = title.toLowerCase(); if (t.includes('critical') || t.includes(' actively') || t.includes('zeroday')) return 'critical'; if (t.includes('high')) return 'high'; if (t.includes('medium')) return 'medium'; return 'low'; }

        async function fetchSingleFeed(feed, isAI = false) {
            const proxies = isAI ? ['https://api.allorigins.win/raw?url=', 'https://rss2json.com/api.json?rss_url='] : ['https://api.allorigins.win/raw?url='];
            for (const proxy of proxies) {
                try {
                    const ctrl = new AbortController(); const to = setTimeout(() => ctrl.abort(), 10000);
                    const url = proxy + encodeURIComponent(feed.url);
                    const res = await fetch(url, { signal: ctrl.signal });
                    clearTimeout(to);
                    if (!res.ok) continue;
                    let text = await res.text();
                    if (proxy.includes('rss2json')) {
                        try { const j = JSON.parse(text); if (j.status === 'ok' && j.items) return j.items.map(i => ({title: i.title, link: i.link, description: i.description, pubDate: i.pubDate, content: i.content, categories: [], source: feed.source})); } catch(e) { continue; }
                    }
                    const parser = new DOMParser(); const xml = parser.parseFromString(text, 'text/xml');
                    const items = xml.querySelectorAll('item');
                    if (items.length === 0) continue;
                    const news = [];
                    items.forEach(item => {
                        const title = item.querySelector('title')?.textContent || '', link = item.querySelector('link')?.textContent || '', description = item.querySelector('description')?.textContent || '', pubDate = item.querySelector('pubDate')?.textContent || '', content = item.querySelector('content\\:encoded')?.textContent || '';
                        const categories = Array.from(item.querySelectorAll('category')).map(c => c.textContent);
                        const pd = parseDate(pubDate);
                        const dd = pd ? getRelativeDate(pd.date) : 'Unknown';
                        news.push({ title: title.replace(/&#8211;/g, '—').replace(/&#8220;/g, '"').replace(/&#8221;/g, '"'), source: feed.source, dateObj: pd, displayDate: dd, date: pd ? pd.display : 'Unknown', time: pd ? pd.time : '', summary: extractSummary(description), url: link, tags: categories.slice(0,4), category: categorizeArticle({title, categories}), isLinkedIn: (description+title).toLowerCase().includes('linkedin') });
                    });
                    return news;
                } catch(e) { console.log('Error', feed.name, e.message); }
            }
            return [];
        }

        async function fetchFromAllFeeds(isAI = false) {
            const feeds = isAI ? AI_RSS_FEEDS : RSS_FEEDS;
            const results = [];
            for (let i = 0; i < feeds.length; i++) {
                const r = await fetchSingleFeed(feeds[i], isAI);
                results.push(r);
                if (!isAI) updateLoadingProgress(Math.round(((i + 1) / feeds.length) * 100));
            }
            return results.flat();
        }

        async function fetchAINews() { const r = await fetchFromAllFeeds(true); const f = r.filter(i => i && isWithinWeek(i.dateObj)); aiNews = removeDuplicates(f).sort((a, b) => (b.dateObj?.timestamp || 0) - (a.dateObj?.timestamp || 0)); renderFlashNews(); }

        function updateLoadingProgress(p) { document.getElementById('loadingProgress').innerHTML = p + '<span>%</span>'; }

        async function fetchNews(isAuto = false) {
            const btn = document.getElementById('refreshBtn'), ol = document.getElementById('loadingOverlay');
            if (!isAuto) { btn.classList.add('loading'); ol.classList.add('active'); updateLoadingProgress(0); }
            try {
                allNews = await fetchFromAllFeeds(false);
                await fetchAINews();
                const now = new Date();
                document.getElementById('lastUpdated').textContent = 'Last updated: ' + now.toLocaleTimeString();
                document.getElementById('newsCount').textContent = allNews.length + ' articles';
                filterNews();
            } catch(e) { console.error(e); filterNews(); }
            finally { if (!isAuto) { btn.classList.remove('loading'); ol.classList.remove('active'); } }
        }

        function createNewsCard(n, i) {
            const card = document.createElement('div');
            card.className = 'news-card ' + (n.isLinkedIn ? 'linkedin-post' : '');
            card.style.animationDelay = (i * 0.05) + 's';
            const tagsHtml = n.tags.map(t => { const imp = t.toLowerCase().includes('breach') || t.toLowerCase().includes('vulnerability') || t.toLowerCase().includes('attack') || t.toLowerCase().includes('exploit'); return '<span class="tag ' + (imp ? 'important' : '') + '">' + t + '</span>'; }).join('');
            const cveHtml = getCVEBadge(n.title);
            const isBookmarked = bookmarks.some(b => b.url === n.url);
            card.innerHTML = '<div class="card-header"><span class="source">' + n.source + '</span><span class="date">' + n.displayDate + '</span></div><h3 class="card-title">' + n.title + cveHtml + '</h3><p class="card-summary">' + n.summary + '</p><div class="card-tags">' + tagsHtml + '</div><div class="card-overlay"><button class="overlay-btn open-btn" onclick="openNews(\'' + n.url + '\')">Open</button><button class="overlay-btn copy-btn" onclick="copyNews(event, \'' + n.title.replace(/'/g, "\\'") + '\', \'' + n.summary.replace(/'/g, "\\'") + '\', \'' + n.url + '\')">Copy</button></div>';
            return card;
        }

        function renderNews(items) {
            const grid = document.getElementById('newsGrid');
            if (!items || items.length === 0) { grid.innerHTML = '<div class="no-results"><h3>No news found</h3><p>Try adjusting filters.</p></div>'; return; }
            grid.innerHTML = ''; items.forEach((n, i) => grid.appendChild(createNewsCard(n, i)));
        }

        function filterNews() {
            let f = allNews;
            if (currentCategory !== 'all') {
                if (currentCategory === 'microsoft') f = f.filter(n => n.tags.some(t => t.toLowerCase().includes('microsoft')) || n.title.toLowerCase().includes('microsoft') || n.title.toLowerCase().includes('windows'));
                else if (currentCategory === 'ai') f = f.filter(n => n.category === 'ai' || n.title.toLowerCase().includes('ai'));
                else if (currentCategory === 'ai-news') { renderNews(aiNews.slice(0, 30)); return; }
                else f = f.filter(n => n.category === currentCategory);
            }
            if (currentTimeFilter !== 'all') {
                if (currentTimeFilter === 'today') f = f.filter(n => isWithinDay(n.dateObj));
                else if (currentTimeFilter === 'week') f = f.filter(n => isWithinWeek(n.dateObj));
                else if (currentTimeFilter === 'month') f = f.filter(n => isWithinMonth(n.dateObj));
            }
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                f = f.filter(n => n.title.toLowerCase().includes(q) || n.summary.toLowerCase().includes(q) || n.tags.some(t => t.toLowerCase().includes(q)));
            }
            renderNews(f);
        }

        function setTimeFilter(t) { currentTimeFilter = t; document.querySelectorAll('.time-filter button').forEach(b => b.classList.toggle('active', b.dataset.time === t)); filterNews(); }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            document.getElementById('autoToggle').classList.toggle('active', autoRefreshEnabled);
            if (autoRefreshEnabled) { startAutoRefresh(); } else { stopAutoRefresh(); }
        }

        let cd = 30;
        function startAutoRefresh() { cd = 30; document.getElementById('countdown').textContent = 'Next refresh: ' + cd + 's'; document.getElementById('statusDot').classList.remove('inactive'); document.getElementById('statusText').textContent = 'Live'; cdInterval = setInterval(() => { cd--; document.getElementById('countdown').textContent = 'Next refresh: ' + cd + 's'; }, 1000); refreshInterval = setInterval(() => { fetchNews(true); cd = 30; }, 30000); }
        function stopAutoRefresh() { clearInterval(cdInterval); clearInterval(refreshInterval); document.getElementById('countdown').textContent = 'Paused'; document.getElementById('statusDot').classList.add('inactive'); document.getElementById('statusText').textContent = 'Paused'; }

        function openNews(url) { window.open(url, '_blank'); }
        function copyNews(e, title, summary, url) { e.stopPropagation(); navigator.clipboard.writeText(title + '\n\n' + summary + '\n\nRead more: ' + url).then(() => { e.target.textContent = 'Copied!'; e.target.classList.add('copied'); setTimeout(() => { e.target.textContent = 'Copy'; e.target.classList.remove('copied'); }, 2000); }); }

        function renderFlashNews() { const t = document.getElementById('flashNewsTrack'); const top = aiNews.slice(0, 10); t.innerHTML = top.map(n => '<a href="' + n.url + '" target="_blank" class="flash-news-item">' + n.title + '</a>').join('') + top.map(n => '<a href="' + n.url + '" target="_blank" class="flash-news-item">' + n.title + '</a>').join(''); }

        function exportToCSV() { const rows = [['Title', 'Source', 'Date', 'URL', 'Category']]; allNews.forEach(n => rows.push([n.title, n.source, n.date, n.url, n.category])); const csv = rows.map(r => r.map(c => '"' + c + '"').join(',')).join('\n'); const blob = new Blob([csv], {type: 'text/csv'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hackersbun_news_' + new Date().toISOString().split('T')[0] + '.csv'; a.click(); }

        function showBookmarks() { document.getElementById('bookmarkModal').classList.add('visible'); const list = document.getElementById('bookmarkList'); if (bookmarks.length === 0) { list.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">No bookmarks saved yet.</p>'; return; } list.innerHTML = bookmarks.map((b, i) => '<div class="bookmark-item"><h4>' + b.title + '</h4><div class="meta"><span>' + b.source + '</span><span>' + b.date + '</span></div><div class="bookmark-actions"><button onclick="openNews(\'' + b.url + '\')">Open</button><button onclick="removeBookmark(' + i + ')">Remove</button></div></div>').join(''); }
        function closeModal() { document.getElementById('bookmarkModal').classList.remove('visible'); }
        function removeBookmark(i) { bookmarks.splice(i, 1); saveBookmarks(); showBookmarks(); }

        document.querySelectorAll('.category-tab').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('.category-tab').forEach(x => x.classList.remove('active')); b.classList.add('active'); currentCategory = b.dataset.category; filterNews(); }));
        
        document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value; filterNews(); });

        loadTheme(); loadBookmarks(); fetchNews();
    </script>
</body>
